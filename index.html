<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Almost Random Words</title>
    <meta
      name="description"
      content="This page prints random words from a popular diceware words list."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <noscript>
      <div id="noscript-warning">
        Please enable JavaScript. This page is useless without JavaScript.
      </div>
    </noscript>
    <div class="splash-container">
      <div class="splash">
        <h1 class="splash-head">Almost Random Words</h1>
        <p class="splash-subhead">
          This page prints random words from a
          <a href="https://www.eff.org/deeplinks/2016/07/new-wordlists-random-passphrases">popular diceware words list</a>.
          It uses a cryptographically sound method, but please switch to
          <a href="https://theworld.com/~reinhold/diceware.html">physical entropy</a>
          for your highest security applications.
        </p>
      </div>
    </div>
    <div class="controls">
      <input
        type="number"
        id="howMany"
        value="500"
        min="1"
        max="1000"
        step="1"
        required
      />
      <button
        type="button"
        id="run"
        class="button-primary"
      >
        Get Words
      </button>
      <p id="result"></p>
    </div>

    <a class="repo-link" href="https://github.com/robert-claypool/almost-rw">Source on GitHub</a>

    <script src="almost.js"></script>
    <script>
      (function () {
        var runButton = document.getElementById('run');
        var howManyInput = document.getElementById('howMany');
        var result = document.getElementById('result');

        function run() {
          runButton.disabled = true;
          result.textContent = 'Loading word list...';
          almost.load(function (loadError) {
            if (loadError) {
              result.textContent = loadError;
              runButton.disabled = false;
              return;
            }

            result.textContent = almost.getWords(howManyInput.value);
            runButton.disabled = false;
          });
        }

        runButton.addEventListener('click', run);
      })();
    </script>
  </body>
</html>
